<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Daily Brief App</title>
  <style>
    body { font-family: 'Courier New', monospace; background: #0d0d0d; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { border: 1px solid #333; border-radius: 8px; padding: 40px 48px; max-width: 480px; text-align: center; }
    h1 { font-size: 20px; color: #fff; margin: 0 0 8px; font-weight: normal; letter-spacing: 0.05em; }
    p { color: #888; font-size: 13px; margin: 0 0 24px; }
    .badge { display: inline-block; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; padding: 4px 10px; font-size: 12px; color: #00cc66; margin-bottom: 24px; }
    .schedule { font-size: 12px; color: #555; }
    .schedule span { color: #aaa; }
  </style>
</head>
<body>
  <div class="box">
    <h1>⚡ Daily Brief App</h1>
    <p>AI · Security · Startups · Markets</p>
    <div class="badge">● deployed</div>
    <div class="schedule">
      Sends via <span>/api/send_brief</span><br/>
      Scheduled <span>Mon–Fri 8 AM PST</span>
    </div>
  </div>
</body>
</html>
